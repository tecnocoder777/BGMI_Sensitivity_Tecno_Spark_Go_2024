<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God Level UPI Generator Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        /* SECURITY: Disable Selection & Touch Callouts */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            background-color: #050505;
            background-image: radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 20px 100px 20px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header { text-align: center; margin-bottom: 5px; }
        .header h1 { font-size: 32px; font-weight: 900; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; font-size: 14px; font-weight: 600; margin-top: 5px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #00f2fe; background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        input::placeholder { color: #666; font-weight: 400; }

        .vibe-title { font-size: 12px; color: #aaa; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; margin-bottom: 5px; }
        .theme-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .theme-scroll::-webkit-scrollbar { display: none; }
        
        .theme-pill {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 800;
            color: #ccc;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.3s;
        }
        .theme-pill.active { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.3); transform: scale(1.05); }

        .card-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
        }

        .stickers-layer { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1; }
        
        .st-text {
            position: absolute;
            top: 12%; 
            left: 50%;
            transform: translateX(-50%) rotate(-4deg);
            width: 90%;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff, -4px 0 0 #fff, 4px 0 0 #fff, 0 -4px 0 #fff, 0 4px 0 #fff, 0 10px 20px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .st-emoji { position: absolute; font-size: 65px; filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.4)); }
        .st-1 { top: 25%; left: 5%; transform: rotate(-20deg); }
        .st-2 { bottom: 15%; right: 5%; transform: rotate(15deg); font-size: 80px;}
        .st-3 { bottom: 8%; left: 8%; transform: rotate(-10deg); font-size: 50px;}

        .qr-glass-panel {
            position: relative;
            z-index: 10;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            width: 80%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-top: 30px; 
        }

        .qr-container { position: relative; display: inline-block; margin-bottom: 20px; padding: 5px; }
        #qr-canvas { display: block; border-radius: 10px; }

        .laser-scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #00f2fe;
            box-shadow: 0 0 15px 2px rgba(0, 242, 254, 0.8);
            animation: scan 2s infinite ease-in-out alternate; border-radius: 50%; z-index: 20;
        }

        @keyframes scan { 0% { top: 5%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 95%; opacity: 0; } }

        .user-name { font-size: 24px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,0.6); word-wrap: break-word; line-height: 1.1; }
        .upi-id { font-size: 14px; font-weight: 800; background: rgba(0, 0, 0, 0.6); padding: 6px 16px; border-radius: 10px; color: #00f2fe; display: inline-block; border: 1px solid rgba(0, 242, 254, 0.3); }

        .scan-badge {
            position: absolute; bottom: 30px; z-index: 10; background: #fff; color: #000; padding: 10px 24px;
            border-radius: 30px; font-size: 14px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); } 50% { transform: scale(1.08); box-shadow: 0 15px 30px rgba(255,255,255,0.4); } 100% { transform: scale(1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); } }

        .download-btn {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 400px;
            background: linear-gradient(90deg, #00f2fe, #4facfe); color: #000; border: none; padding: 18px; border-radius: 20px;
            font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 242, 254, 0.4); transition: 0.2s; z-index: 100;
        }
        .download-btn:active { transform: translate(-50%, 5px); }

        /* TROLL SCREEN UI */
        #troll-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: red; z-index: 999999; color: white; text-align: center;
            justify-content: center; align-items: center; flex-direction: column; font-size: 2rem;
            font-weight: 900; padding: 20px;
        }
        #troll-screen h1 { font-size: 50px; text-transform: uppercase; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- TROLL SCREEN HIDDEN BY DEFAULT -->
    <div id="troll-screen">
        <h1>🚨 CHOR PAKDA GAYA! 🚨</h1>
        <p>Bade aaye source code churane wale! 😎<br>Aukaat me reh bhai, apna khud ka code likh le.</p>
        <p style="font-size: 20px; margin-top:20px;">Ab page reload kar!</p>
    </div>

    <div class="app-container" id="app-container">
        
        <div class="header">
            <h1>Swag Scanner Pro</h1>
            <p>Next-Gen Premium UPI Story</p>
        </div>

        <div class="glass-panel">
            <input type="text" id="upiId" placeholder="Tera UPI ID (e.g. rahul@ybl)" oninput="generateQR()">
            <input type="text" id="userName" placeholder="Display Name (e.g. Rahul Don)" oninput="generateQR()">
            <input type="number" id="amount" placeholder="Amount ₹ (Optional)" oninput="generateQR()">

            <div>
                <div class="vibe-title">Select Vibe ⚡</div>
                <div class="theme-scroll" id="theme-container"></div>
            </div>
        </div>

        <div class="card-wrapper" id="capture-area">
            
            <div class="stickers-layer" id="sticker-layer">
                <div class="st-text" id="vibe-text">PAISA HI PAISA</div>
                <div class="st-emoji st-1" id="emoji-1">💸</div>
                <div class="st-emoji st-2" id="emoji-2">💰</div>
                <div class="st-emoji st-3" id="emoji-3">🤑</div>
            </div>

            <div class="qr-glass-panel" id="glass-box">
                <div class="qr-container">
                    <div id="qr-canvas"></div>
                    <div class="laser-scanner" id="laser-effect"></div>
                </div>
                <div class="user-name" id="display-name">YOUR NAME</div>
                <div class="upi-id" id="display-upi">enter@upi</div>
            </div>

            <div class="scan-badge" id="badge">Scan To Pay</div>
        </div>

    </div>

    <button class="download-btn" onclick="downloadCard()" id="dl-btn">
        📸 Save HD Image
    </button>

    <!-- MAIN APP LOGIC -->
    <script>
        const themes =[
            { name: "🤑 Paisa", bg: "radial-gradient(circle at top, #ffea00, #ff8c00)", text: "PAISA HI PAISA", e1: "💸", e2: "💰", e3: "🤑" },
            { name: "🕶️ Thug Life", bg: "linear-gradient(135deg, #18181b, #000000)", text: "THUG LIFE", e1: "🕶️", e2: "💀", e3: "🚬" },
            { name: "😭 Garib", bg: "linear-gradient(to bottom, #4ca1af, #c4e0e5)", text: "0 BALANCE", e1: "😭", e2: "💔", e3: "📉" },
            { name: "🚀 Hustle", bg: "linear-gradient(to top, #0ba360, #3cba92)", text: "GRINDING", e1: "💼", e2: "🚀", e3: "📈" },
            { name: "✨ Aesthetic", bg: "linear-gradient(45deg, #fbc2eb, #a6c1ee)", text: "VIBES ONLY", e1: "🌸", e2: "🦋", e3: "✨" },
            { name: "👽 Hacker", bg: "radial-gradient(circle, #065f46, #000)", text: "SYSTEM HACKED", e1: "💻", e2: "☠️", e3: "👾" },
            { name: "☢️ Toxic", bg: "linear-gradient(to right, #000000, #434343)", text: "AUKAAT", e1: "🐍", e2: "☢️", e3: "😈" }
        ]; 

        let qrCodeInstance = null;

        window.onload = () => { renderThemes(); applyTheme(0); generateQR(); };

        function renderThemes() {
            const container = document.getElementById("theme-container");
            themes.forEach((theme, index) => {
                let btn = document.createElement("div");
                btn.className = "theme-pill";
                if(index === 0) btn.classList.add("active");
                btn.innerText = theme.name;
                btn.onclick = () => {
                    document.querySelectorAll(".theme-pill").forEach(p => p.classList.remove("active"));
                    btn.classList.add("active");
                    applyTheme(index);
                };
                container.appendChild(btn);
            });
        }

        function applyTheme(index) {
            let t = themes[index];
            document.getElementById("capture-area").style.background = t.bg;
            document.getElementById("vibe-text").innerText = t.text;
            document.getElementById("emoji-1").innerText = t.e1;
            document.getElementById("emoji-2").innerText = t.e2;
            document.getElementById("emoji-3").innerText = t.e3;
        }

        function generateQR() {
            let upi = document.getElementById("upiId").value.trim();
            let name = document.getElementById("userName").value.trim() || "YOUR NAME";
            let amount = document.getElementById("amount").value.trim();

            document.getElementById("display-name").innerText = name;
            document.getElementById("display-upi").innerText = upi ? upi : "enter@upi";

            let qrBox = document.getElementById("qr-canvas");
            qrBox.innerHTML = ""; 

            if (!upi) return;

            let upiLink = `upi://pay?pa=${upi}&pn=${encodeURIComponent(name)}&cu=INR`;
            if (amount) upiLink += `&am=${amount}`;

            qrCodeInstance = new QRCode(qrBox, {
                text: upiLink, width: 170, height: 170, colorDark: "#ffffff", colorLight: "rgba(255,255,255,0)", correctLevel: QRCode.CorrectLevel.H 
            });
        }

        function downloadCard() {
            const captureArea = document.getElementById("capture-area");
            const btn = document.getElementById("dl-btn");
            
            window.scrollTo(0, 0); 
            let originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Generating Masterpiece...";

            html2canvas(captureArea, {
                scale: 3, useCORS: true, backgroundColor: null, allowTaint: true,
                onclone: (clonedDoc) => {
                    let clonedLaser = clonedDoc.getElementById("laser-effect");
                    if(clonedLaser) clonedLaser.style.display = "none";
                    let clonedBadge = clonedDoc.getElementById("badge");
                    if(clonedBadge) clonedBadge.style.animation = "none";
                    let clonedGlass = clonedDoc.getElementById("glass-box");
                    if(clonedGlass) clonedGlass.style.backgroundColor = "rgba(255,255,255,0.08)";
                }
            }).then(canvas => {
                let link = document.createElement('a');
                link.download = 'God_Level_Scanner_Pro.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerHTML = originalText;
            });
        }
    </script>

    <!-- ☠️ ANTI-HACKER & SECURITY SYSTEM ☠️ -->
    <script>
        // Function to show Troll Screen
        function activateTrollMode() {
            document.getElementById('app-container').style.display = 'none';
            document.getElementById('dl-btn').style.display = 'none';
            document.getElementById('troll-screen').style.display = 'flex';
        }

        // 1. Disable Right Click
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alert("Bhai right click yahan kaam nahi karta! 😎");
        });

        // 2. Disable Keyboard Shortcuts (Ctrl+U, F12, Ctrl+Shift+I, Ctrl+S)
        document.onkeydown = function(e) {
            if (
                e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && e.key === "I") || 
                (e.ctrlKey && e.shiftKey && e.key === "C") || 
                (e.ctrlKey && e.shiftKey && e.key === "J") || 
                (e.ctrlKey && e.key === "U") || 
                (e.ctrlKey && e.key === "S")
            ) {
                e.preventDefault();
                activateTrollMode();
                return false;
            }
        };

        // 3. Ultimate DevTools Blocker (Debugger Loop)
        // Agar usne kisi tarah Inspect khol bhi liya, toh browser continuously hang hota rahega
        setInterval(() => {
            const before = new Date().getTime();
            debugger; // Yeh developer tools khule hone par page ko freeze kar dega
            const after = new Date().getTime();
            if (after - before > 100) {
                // If debugger triggered (meaning devtools is open), show troll screen
                activateTrollMode();
            }
        }, 100);

        // 4. Console Troll Messages
        console.log("%cRuk Jaa Bhai! 🛑", "color: red; font-size: 50px; font-weight: bold; -webkit-text-stroke: 1px black;");
        console.log("%cSource code churane ka try mat kar, aukaat me reh.", "color: yellow; font-size: 20px; background: black; padding: 10px;");
    </script>

</body>
</html>
